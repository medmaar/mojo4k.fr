name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: 'npm install -g wrangler'

      - name: Deploy and capture output
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: worker
        run: 'wrangler deploy > /tmp/wrangler_output.txt 2>&1; echo "EXIT_CODE:$?" >> /tmp/wrangler_output.txt; cat /tmp/wrangler_output.txt'
        continue-on-error: true

      - name: Commit debug output
        run: 'mkdir -p .debug && cp /tmp/wrangler_output.txt .debug/wrangler_output.txt && git config user.name bot && git config user.email bot@example.com && git add .debug/wrangler_output.txt && git commit -m debug-output && git push'
        continue-on-error: true
