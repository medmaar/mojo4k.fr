name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: iptv-trial-mojo4kfr
        run: |
          METADATA=$(cat <<'METADATA'
          {
            "main_module": "worker.js",
            "compatibility_date": "2024-01-01",
            "bindings": [
              {
                "type": "kv_namespace",
                "name": "TRIALS",
                "namespace_id": "e928e75a62144a48a6a5c7fee9a94a3e"
              }
            ]
          }
          METADATA
          )
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -F "metadata=${METADATA};type=application/json" \
            -F "worker.js=@worker/worker.js;type=application/javascript+module" \
            -o /tmp/deploy_result.json -w "HTTPSTATUS:%{http_code}\n"
          cat /tmp/deploy_result.json
        continue-on-error: true

      - name: Commit result
        run: |
          mkdir -p .debug
          cp /tmp/deploy_result.json .debug/deploy_result.json
          git config user.name bot
          git config user.email bot@example.com
          git add .debug/deploy_result.json
          git commit -m "debug: capture result" || true
          git push || true
