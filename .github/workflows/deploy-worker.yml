name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: iptv-trial-mojo4kfr
        run: 'curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/${WORKER_NAME}" -H "Authorization: Bearer ${CF_TOKEN}" -F "metadata=@worker/metadata.json;type=application/json" -F "worker.js=@worker/worker.js;type=application/javascript+module"'

      - name: Set Cron Trigger
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: iptv-trial-mojo4kfr
        run: 'curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/${WORKER_NAME}/schedules" -H "Authorization: Bearer ${CF_TOKEN}" -H "Content-Type: application/json" --data-binary @worker/cron.json'
